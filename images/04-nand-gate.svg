<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <circle cx="4" cy="4" r="3" fill="#222"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">与非门（NAND Gate）电路</text>

  <!-- 电路图区域 -->
  <rect x="40" y="50" width="380" height="310" rx="10" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Vcc -->
  <text x="380" y="80" text-anchor="end" font-size="13" font-weight="bold" fill="#d32f2f">Vcc (+5V)</text>

  <!-- 上拉电阻 R -->
  <rect x="300" y="85" width="50" height="30" rx="4" fill="#fff" stroke="#e0a800" stroke-width="2"/>
  <text x="325" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0a800">R</text>

  <!-- Vcc → R -->
  <line x1="380" y1="80" x2="380" y2="85" stroke="#222" stroke-width="1.5"/>
  <line x1="380" y1="85" x2="350" y2="85" stroke="#222" stroke-width="1.5"/>
  <line x1="300" y1="85" x2="325" y2="85" stroke="#222" stroke-width="1.5"/>
  <!-- R → Q1 集电极 -->
  <line x1="325" y1="115" x2="325" y2="140" stroke="#222" stroke-width="1.5"/>

  <!-- ===== Q1（上面） ===== -->
  <circle cx="325" cy="175" r="3" fill="#222"/>
  <line x1="325" y1="140" x2="325" y2="172" stroke="#222" stroke-width="2"/>
  <line x1="325" y1="172" x2="280" y2="160" stroke="#222" stroke-width="2"/>
  <line x1="280" y1="160" x2="280" y2="180" stroke="#222" stroke-width="2"/>
  <line x1="280" y1="180" x2="325" y2="190" stroke="#222" stroke-width="2"/>
  <line x1="325" y1="190" x2="325" y2="200" stroke="#222" stroke-width="2"/>
  <polygon points="325,194 330,199 320,199" fill="#222"/>

  <!-- Q1 标注 -->
  <text x="270" y="173" text-anchor="end" font-size="11" font-weight="bold" fill="#1565c0">Q1</text>

  <!-- 串联线 Q1→Q2 -->
  <line x1="325" y1="200" x2="325" y2="220" stroke="#222" stroke-width="2"/>

  <!-- ===== Q2（下面，串联） ===== -->
  <circle cx="325" cy="255" r="3" fill="#222"/>
  <line x1="325" y1="220" x2="325" y2="252" stroke="#222" stroke-width="2"/>
  <line x1="325" y1="252" x2="280" y2="240" stroke="#222" stroke-width="2"/>
  <line x1="280" y1="240" x2="280" y2="260" stroke="#222" stroke-width="2"/>
  <line x1="280" y1="260" x2="325" y2="270" stroke="#222" stroke-width="2"/>
  <line x1="325" y1="270" x2="325" y2="280" stroke="#222" stroke-width="2"/>
  <polygon points="325,274 330,279 320,279" fill="#222"/>

  <!-- Q2 标注 -->
  <text x="270" y="253" text-anchor="end" font-size="11" font-weight="bold" fill="#c62828">Q2</text>

  <!-- 接地 -->
  <line x1="325" y1="280" x2="325" y2="305" stroke="#222" stroke-width="1.5"/>
  <line x1="295" y1="305" x2="355" y2="305" stroke="#222" stroke-width="1.5"/>
  <text x="365" y="308" font-size="11" fill="#555">GND（0V）</text>

  <!-- ===== 基极电阻 ===== -->
  <!-- Rb1 -->
  <rect x="100" y="158" width="50" height="30" rx="4" fill="#fff" stroke="#e0a800" stroke-width="2"/>
  <text x="125" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0a800">Rb1</text>
  <line x1="100" y1="173" x2="60" y2="173" stroke="#222" stroke-width="1.5"/>
  <line x1="150" y1="173" x2="280" y2="170" stroke="#222" stroke-width="1.5"/>

  <!-- Rb2 -->
  <rect x="100" y="238" width="50" height="30" rx="4" fill="#fff" stroke="#e0a800" stroke-width="2"/>
  <text x="125" y="257" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0a800">Rb2</text>
  <line x1="100" y1="253" x2="60" y2="253" stroke="#222" stroke-width="1.5"/>
  <line x1="150" y1="253" x2="280" y2="250" stroke="#222" stroke-width="1.5"/>

  <!-- 输入 A -->
  <circle cx="35" cy="173" r="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="35" y="178" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">A</text>

  <!-- 输入 B -->
  <circle cx="35" cy="253" r="15" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="35" y="258" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">B</text>

  <!-- 串联标注 -->
  <text x="370" y="210" font-size="10" fill="#888">⬍ 串联</text>

  <!-- 输出 Y -->
  <circle cx="200" cy="85" r="15" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">Y</text>
  <line x1="325" y1="140" x2="200" y2="85" stroke="#222" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ===== 右侧：真值表 ===== -->
  <rect x="440" y="55" width="230" height="300" rx="10" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>

  <text x="555" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">真值表</text>

  <!-- 表头 -->
  <rect x="460" y="95" width="65" height="32" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="492" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">A</text>
  <rect x="530" y="95" width="55" height="32" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="557" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#1565c0">B</text>
  <rect x="590" y="95" width="60" height="32" rx="4" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="620" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">Y</text>

  <!-- 行 -->
  <rect x="460" y="135" width="65" height="35" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="492" y="158" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">0</text>
  <rect x="530" y="135" width="55" height="35" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="557" y="158" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">0</text>
  <rect x="590" y="135" width="60" height="35" rx="2" fill="#fff3e0" stroke="#ffe0b2" stroke-width="1"/>
  <text x="620" y="158" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">1</text>

  <rect x="460" y="175" width="65" height="35" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="492" y="198" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">0</text>
  <rect x="530" y="175" width="55" height="35" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="557" y="198" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">1</text>
  <rect x="590" y="175" width="60" height="35" rx="2" fill="#fff3e0" stroke="#ffe0b2" stroke-width="1"/>
  <text x="620" y="198" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">1</text>

  <rect x="460" y="215" width="65" height="35" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="492" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">1</text>
  <rect x="530" y="215" width="55" height="35" rx="2" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="557" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">0</text>
  <rect x="590" y="215" width="60" height="35" rx="2" fill="#fff3e0" stroke="#ffe0b2" stroke-width="1"/>
  <text x="620" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">1</text>

  <rect x="460" y="255" width="65" height="35" rx="2" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="492" y="278" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">1</text>
  <rect x="530" y="255" width="55" height="35" rx="2" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="557" y="278" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">1</text>
  <rect x="590" y="255" width="60" height="35" rx="2" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1"/>
  <text x="620" y="278" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">0</text>

  <!-- 表达式 -->
  <rect x="460" y="305" width="190" height="35" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="555" y="328" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">Y = A · B</text>

  <!-- 说明 -->
  <rect x="40" y="370" width="630" height="40" rx="6" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="355" y="388" text-anchor="middle" font-size="13" fill="#6a1b9a">
    💡 两个三极管串联：只有 A=1 <b>且</b> B=1 时，两个都导通，Y=0；否则至少一个截止，Y=1
  </text>
  <text x="355" y="403" text-anchor="middle" font-size="13" fill="#6a1b9a">
    🎯 NAND 是<b>通用门</b>——只用 NAND 就能搭建所有其他逻辑门
  </text>
</svg>