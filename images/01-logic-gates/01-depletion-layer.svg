<svg width="600" style="max-width:90%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#d32f2f">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#1565c0">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="720" height="340" fill="#ffffff" rx="8" />

  <!-- ========== P 区 ========== -->
  <rect x="20" y="50" width="200" height="240" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="6" />
  <text x="120" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#1565c0">P 区</text>
  <text x="120" y="102" text-anchor="middle" font-size="13" fill="#333">（空穴很多）</text>

  <!-- P 区晶格点 -->
  <g fill="none" stroke="#90caf9" stroke-width="1.5">
    <!-- 横线 -->
    <line x1="50" y1="140" x2="190" y2="140" />
    <line x1="50" y1="180" x2="190" y2="180" />
    <line x1="50" y1="220" x2="190" y2="220" />
    <line x1="50" y1="260" x2="190" y2="260" />
    <!-- 竖线 -->
    <line x1="80" y1="120" x2="80" y2="280" />
    <line x1="120" y1="120" x2="120" y2="280" />
    <line x1="160" y1="120" x2="160" y2="280" />
  </g>

  <!-- P 区 Si 原子 -->
  <g fill="#1565c0">
    <circle cx="80" cy="140" r="5" />
    <circle cx="120" cy="140" r="5" />
    <circle cx="160" cy="140" r="5" />
    <circle cx="80" cy="180" r="5" />
    <circle cx="120" cy="180" r="5" />
    <circle cx="160" cy="180" r="5" />
    <circle cx="80" cy="220" r="5" />
    <circle cx="120" cy="220" r="5" />
    <circle cx="160" cy="220" r="5" />
    <circle cx="80" cy="260" r="5" />
    <circle cx="120" cy="260" r="5" />
    <circle cx="160" cy="260" r="5" />
  </g>

  <!-- P 区 空穴 ● -->
  <g fill="#e53935" font-size="16" font-weight="bold">
    <text x="74" y="146">●</text>
    <text x="114" y="186">●</text>
    <text x="154" y="226">●</text>
    <text x="74" y="226">●</text>
    <text x="154" y="186">●</text>
  </g>

  <!-- P 区标签 -->
  <text x="120" y="310" text-anchor="middle" font-size="13" fill="#666">多数载流子：空穴（正电荷）</text>

  <!-- ========== N 区 ========== -->
  <rect x="500" y="50" width="200" height="240" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" rx="6" />
  <text x="600" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2e7d32">N 区</text>
  <text x="600" y="102" text-anchor="middle" font-size="13" fill="#333">（电子很多）</text>

  <!-- N 区晶格点 -->
  <g fill="none" stroke="#a5d6a7" stroke-width="1.5">
    <line x1="530" y1="140" x2="670" y2="140" />
    <line x1="530" y1="180" x2="670" y2="180" />
    <line x1="530" y1="220" x2="670" y2="220" />
    <line x1="530" y1="260" x2="670" y2="260" />
    <line x1="560" y1="120" x2="560" y2="280" />
    <line x1="600" y1="120" x2="600" y2="280" />
    <line x1="640" y1="120" x2="640" y2="280" />
  </g>

  <!-- N 区 Si 原子 -->
  <g fill="#2e7d32">
    <circle cx="560" cy="140" r="5" />
    <circle cx="600" cy="140" r="5" />
    <circle cx="640" cy="140" r="5" />
    <circle cx="560" cy="180" r="5" />
    <circle cx="600" cy="180" r="5" />
    <circle cx="640" cy="180" r="5" />
    <circle cx="560" cy="220" r="5" />
    <circle cx="600" cy="220" r="5" />
    <circle cx="640" cy="220" r="5" />
    <circle cx="560" cy="260" r="5" />
    <circle cx="600" cy="260" r="5" />
    <circle cx="640" cy="260" r="5" />
  </g>

  <!-- N 区 自由电子 ○ -->
  <g fill="#fdd835" stroke="#f9a825" stroke-width="1.5" font-size="18" font-weight="bold">
    <text x="554" y="146">○</text>
    <text x="594" y="186">○</text>
    <text x="634" y="146">○</text>
    <text x="554" y="186">○</text>
    <text x="634" y="226">○</text>
    <text x="594" y="266">○</text>
  </g>

  <!-- N 区标签 -->
  <text x="600" y="310" text-anchor="middle" font-size="13" fill="#666">多数载流子：自由电子（负电荷）</text>

  <!-- ========== 耗尽层 ========== -->
  <rect x="230" y="50" width="260" height="240" fill="#fff8e1" stroke="#f57f17" stroke-width="2" rx="6" />
  <text x="360" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#e65100">耗尽层</text>
  <text x="360" y="100" text-anchor="middle" font-size="12" fill="#e65100">（空间电荷区）</text>
  <text x="360" y="118" text-anchor="middle" font-size="11" fill="#888">无自由载流子，只有固定离子</text>

  <!-- 耗尽层分隔虚线 -->
  <line x1="360" y1="50" x2="360" y2="290" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="6,4" />

  <!-- 左侧耗尽层（P 侧）→ 负离子 A⁻ -->
  <rect x="245" y="140" width="100" height="130" fill="#ffebee" stroke="#ef9a9a" stroke-width="1" rx="4" />
  <text x="295" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">负离子</text>
  <g font-size="16" font-weight="bold" fill="#c62828">
    <text x="265" y="200">A⁻</text>
    <text x="305" y="200">A⁻</text>
    <text x="285" y="235">A⁻</text>
    <text x="265" y="265">A⁻</text>
    <text x="325" y="235">A⁻</text>
  </g>
  <text x="295" y="285" text-anchor="middle" font-size="11" fill="#c62828">受主离子</text>

  <!-- 右侧耗尽层（N 侧）→ 正离子 D⁺ -->
  <rect x="375" y="140" width="100" height="130" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1" rx="4" />
  <text x="425" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">正离子</text>
  <g font-size="16" font-weight="bold" fill="#2e7d32">
    <text x="395" y="200">D⁺</text>
    <text x="435" y="200">D⁺</text>
    <text x="415" y="235">D⁺</text>
    <text x="395" y="265">D⁺</text>
    <text x="455" y="235">D⁺</text>
  </g>
  <text x="425" y="285" text-anchor="middle" font-size="11" fill="#2e7d32">施主离子</text>

  <!-- ========== 内建电场箭头 ========== -->
  <!-- 大箭头从 N→P -->
  <line x1="430" y1="325" x2="290" y2="325" stroke="#d32f2f" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="360" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#d32f2f">内建电场 N → P</text>
</svg>
