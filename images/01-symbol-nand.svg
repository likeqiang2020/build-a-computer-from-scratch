  <line x1="10" y1="10" x2="10" y2="50" stroke="#222" stroke-width="2"/>
  <circle cx="69" cy="30" r="6" fill="#fff" stroke="#222" stroke-width="2"/>
  <!-- inputs -->
  <line x1="0" y1="20" x2="10" y2="20" stroke="#222" stroke-width="2"/>
  <line x1="0" y1="40" x2="10" y2="40" stroke="#222" stroke-width="2"/>
  <!-- output -->
  <line x1="75" y1="30" x2="90" y2="30" stroke="#222" stroke-width="2"/>
</svg>